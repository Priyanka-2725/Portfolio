<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgGradient)"/>
  <g transform="translate(200, 150)">
    <!-- Code brackets -->
    <text x="-80" y="-30" font-family="Courier" font-size="48" fill="#f8c8dc" font-weight="bold">&lt;</text>
    <text x="60" y="-30" font-family="Courier" font-size="48" fill="#f8c8dc" font-weight="bold">/&gt;</text>
    
    <!-- Analytics chart -->
    <g stroke="#f8c8dc" stroke-width="3" fill="none">
      <polyline points="-60,40 -30,20 0,35 30,10 60,25" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="-60" cy="40" r="5" fill="#f8c8dc"/>
      <circle cx="-30" cy="20" r="5" fill="#f8c8dc"/>
      <circle cx="0" cy="35" r="5" fill="#f8c8dc"/>
      <circle cx="30" cy="10" r="5" fill="#f8c8dc"/>
      <circle cx="60" cy="25" r="5" fill="#f8c8dc"/>
    </g>
  </g>
</svg>