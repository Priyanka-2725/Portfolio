<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f3d2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2818;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgGradient3)"/>
  <g transform="translate(200, 150)">
    <!-- Bar chart -->
    <rect x="-70" y="20" width="25" height="40" fill="#f8c8dc" opacity="0.9" rx="3"/>
    <rect x="-30" y="0" width="25" height="60" fill="#f8c8dc" opacity="0.8" rx="3"/>
    <rect x="10" y="-10" width="25" height="70" fill="#f8c8dc" opacity="0.7" rx="3"/>
    <rect x="50" y="10" width="25" height="50" fill="#f8c8dc" opacity="0.8" rx="3"/>
    
    <!-- ML symbol (brain-like) -->
    <circle cx="0" cy="-60" r="15" fill="none" stroke="#f8c8dc" stroke-width="2" opacity="0.8"/>
    <circle cx="-10" cy="-65" r="5" fill="#f8c8dc" opacity="0.6"/>
    <circle cx="10" cy="-65" r="5" fill="#f8c8dc" opacity="0.6"/>
    <circle cx="0" cy="-50" r="5" fill="#f8c8dc" opacity="0.6"/>
    
    <!-- Connecting lines -->
    <line x1="-10" y1="-60" x2="0" y2="-50" stroke="#f8c8dc" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="-60" x2="0" y2="-50" stroke="#f8c8dc" stroke-width="1" opacity="0.5"/>
  </g>
</svg>